name: CI/CD Pipeline

on:
  push:
    branches: [ main, fixes, containerization, ci-cd ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: localhost:5000
  REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}

jobs:
  # ── Stage 1: Lint ──────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python lint dependencies
        run: pip install flake8

      - name: Lint Python (flake8)
        run: flake8 api/ worker/ --max-line-length=120 --exclude=__pycache__,tests

      - name: Install Node dependencies
        run: |
          cd frontend
          npm install --include=dev

      - name: Lint JavaScript (eslint)
        run: |
          cd frontend
          npx eslint app.js

      - name: Lint Dockerfiles (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile
        continue-on-error: false

      - name: Lint worker Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile
        continue-on-error: false

      - name: Lint frontend Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
        continue-on-error: false

  # ── Stage 2: Test ──────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API dependencies
        run: |
          cd api
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          cd api
          pytest tests/ -v --cov=main --cov-report=term --cov-report=html --cov-report=xml
        env:
          PYTHONPATH: api

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/htmlcov/
          retention-days: 7

      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: api/coverage.xml
          retention-days: 7

  # ── Stage 3: Build ─────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: |
          docker build -t ${{ env.REGISTRY }}/api:${{ github.sha }} -t ${{ env.REGISTRY }}/api:latest ./api

      - name: Build Worker image
        run: |
          docker build -t ${{ env.REGISTRY }}/worker:${{ github.sha }} -t ${{ env.REGISTRY }}/worker:latest ./worker

      - name: Build Frontend image
        run: |
          docker build -t ${{ env.REGISTRY }}/frontend:${{ github.sha }} -t ${{ env.REGISTRY }}/frontend:latest ./frontend

      - name: Push images to local registry
        run: |
          docker push ${{ env.REGISTRY }}/api:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/api:latest
          docker push ${{ env.REGISTRY }}/worker:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/worker:latest
          docker push ${{ env.REGISTRY }}/frontend:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/frontend:latest

  # ── Stage 4: Security Scan ─────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild images (from local registry not available across jobs)
        run: |
          docker build -t api:${{ github.sha }} ./api
          docker build -t worker:${{ github.sha }} ./worker
          docker build -t frontend:${{ github.sha }} ./frontend

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6

      - name: Scan API image
        run: |
          trivy image --exit-code 1 --severity CRITICAL --format sarif -o api-results.sarif api:${{ github.sha }}

      - name: Scan Worker image
        run: |
          trivy image --exit-code 1 --severity CRITICAL --format sarif -o worker-results.sarif worker:${{ github.sha }}

      - name: Scan Frontend image
        run: |
          trivy image --exit-code 1 --severity CRITICAL --format sarif -o frontend-results.sarif frontend:${{ github.sha }}

      - name: Upload API SARIF results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-trivy-results
          path: api-results.sarif

      - name: Upload Worker SARIF results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: worker-trivy-results
          path: worker-results.sarif

      - name: Upload Frontend SARIF results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-trivy-results
          path: frontend-results.sarif

  # ── Stage 5: Integration Test ──────────────────────────────────────
  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4

      - name: Run integration test
        run: |
          chmod +x scripts/integration-test.sh
          bash scripts/integration-test.sh
        env:
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          FRONTEND_PORT: "5000"

      - name: Collect logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down stack
        if: always()
        run: docker compose down -v --remove-orphans 2>/dev/null || true

  # ── Stage 6: Deploy ────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up environment
        run: |
          cat > .env <<EOF
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          FRONTEND_PORT=5000
          EOF

      - name: Deploy with rolling update
        run: |
          chmod +x scripts/deploy.sh
          bash scripts/deploy.sh
        env:
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}

      - name: Cleanup
        if: always()
        run: rm -f .env
