<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Job Dashboard</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    button { padding: 10px 20px; cursor: pointer; }
    #result { margin-top: 20px; padding: 10px; background: #f4f4f4; border-radius: 4px; }
    #jobs { margin-top: 20px; }
    .job { padding: 8px; border-bottom: 1px solid #ddd; }
    .error { color: red; }
  </style>
</head>
<body>
  <h1>Job Processor Dashboard</h1>
  <button onclick="submitJob()">Submit New Job</button>
  <div id="result"></div>
  <div id="jobs"></div>

  <script>
    const jobIds = [];

    async function submitJob() {
      const resultEl = document.getElementById('result');
      try {
        const res = await fetch('/submit', { method: 'POST' });
        if (!res.ok) {
          resultEl.innerText = 'Error submitting job';
          resultEl.className = 'error';
          return;
        }
        const data = await res.json();
        if (!data.job_id) {
          resultEl.innerText = 'Error: no job ID returned';
          resultEl.className = 'error';
          return;
        }
        resultEl.className = '';
        resultEl.innerText = `Submitted: ${data.job_id}`;
        jobIds.push(data.job_id);
        pollJob(data.job_id);
      } catch (err) {
        resultEl.innerText = `Error: ${err.message}`;
        resultEl.className = 'error';
      }
    }

    async function pollJob(id) {
      try {
        const res = await fetch(`/status/${id}`);
        if (!res.ok) return;
        const data = await res.json();
        if (!data.status) return;
        renderJob(id, data.status);
        if (data.status !== 'completed') {
          setTimeout(() => pollJob(id), 2000);
        }
      } catch (err) {
        // Retry on network error
        setTimeout(() => pollJob(id), 2000);
      }
    }

    function renderJob(id, status) {
      let el = document.getElementById(id);
      if (!el) {
        el = document.createElement('div');
        el.className = 'job';
        el.id = id;
        document.getElementById('jobs').appendChild(el);
      }
      el.innerText = `Job ${id.substring(0, 8)}... — ${status}`;
    }
  </script>
</body>
</html>
